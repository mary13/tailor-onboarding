<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-semibold text-slate-900 mb-6">
            Payment
        </h1>

        <!-- Order summary -->
        <div class="bg-slate-50 border border-slate-200 rounded-md p-4 mb-6">
            <h2 class="font-medium text-slate-900 mb-3">Order summary</h2>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <span class="text-slate-600">5 fabric swatches</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-600">Delivery</span>
                    <span class="text-slate-900" id="deliveryType">Overnight</span>
                </div>
                <div class="border-t border-slate-200 pt-2 mt-2 flex justify-between font-medium">
                    <span class="text-slate-900">Total</span>
                    <span class="text-slate-900" id="totalPrice">$20</span>
                </div>
            </div>
        </div>

        <!-- Discount message -->
        <div class="bg-emerald-50 border border-emerald-200 rounded-md p-3 mb-6">
            <p class="text-sm text-emerald-900 font-medium">✓ Get 5% off your dress when you order</p>
        </div>

        <form class="space-y-4">
            <!-- Card number -->
            <div>
                <label for="cardNumber" class="block text-sm font-medium text-slate-700 mb-1">Card number</label>
                <input type="text" id="cardNumber"
                       placeholder="1234 5678 9012 3456"
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
            </div>

            <!-- Expiry and CVC -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="expiry" class="block text-sm font-medium text-slate-700 mb-1">Expiry date</label>
                    <input type="text" id="expiry"
                           placeholder="MM/YY"
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                </div>
                <div>
                    <label for="cvc" class="block text-sm font-medium text-slate-700 mb-1">CVC</label>
                    <input type="text" id="cvc"
                           placeholder="123"
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                </div>
            </div>

            <!-- Billing ZIP -->
            <div>
                <label for="billingZip" class="block text-sm font-medium text-slate-700 mb-1">Billing ZIP code</label>
                <input type="text" id="billingZip"
                       placeholder="12345"
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
            </div>

            <!-- Submit button -->
            <a href="path-1-step-4.html"
               id="submitBtn"
               class="block w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-md transition-colors text-center">
                Send my swatches - $20
            </a>

            <!-- Back -->
            <a href="path-1-step-3.html"
               class="block w-full text-slate-600 hover:text-slate-900 font-medium py-3 px-4 transition-colors text-center">
                Back
            </a>
        </form>
    </div>

    <script>
        // In a real app, this would come from session/state
        // For prototype, defaulting to $20 overnight
        const deliveryPrice = 20;
        const deliveryType = 'Overnight';

        document.getElementById('deliveryType').textContent = deliveryType;
        document.getElementById('totalPrice').textContent = `$${deliveryPrice}`;
        document.getElementById('submitBtn').textContent = `Send my swatches - $${deliveryPrice}`;
    </script>
        <!-- Back to scenarios link -->
        <a href="../index.html" class="inline-flex items-center text-sm text-slate-600 hover:text-slate-900 mt-6">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back to all scenarios
        </a>
    </div>
</body>
</html>
