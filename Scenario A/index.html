<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Your Custom Dress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <!-- Dress image placeholder -->
            <div class="bg-slate-200 rounded-md h-64 mb-6 flex items-center justify-center">
                <span class="text-slate-400 text-sm">Dress Image</span>
            </div>

        <h1 class="text-2xl font-semibold text-slate-900 mb-8 text-center">
            Ready to order your custom dress?
        </h1>

        <div class="space-y-4">
            <!-- Order now button -->
            <a href="path-2-step-1.html"
               class="block w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-md transition-colors text-center">
                Order now
            </a>
            <p class="text-sm text-slate-600 text-center -mt-2">
                I'm ready with my measurements
            </p>

            <!-- Send me swatches button -->
            <a href="path-1-step-2.html"
               class="block w-full bg-white hover:bg-slate-50 text-slate-900 font-medium py-3 px-4 rounded-md border-2 border-slate-200 transition-colors text-center mt-6">
                Send me swatches first
            </a>
            <p class="text-sm text-slate-600 text-center -mt-2">
                Overnight delivery
            </p>
        </div>
        </div>

        <!-- Back to scenarios link -->
        <a href="../index.html" class="inline-flex items-center text-sm text-slate-600 hover:text-slate-900 mt-6">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back to all scenarios
        </a>
    </div>
</body>
</html>
