<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping & Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-semibold text-slate-900 mb-6">
            Where should we send your swatches?
        </h1>

        <form class="space-y-4">
            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" id="email"
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                <p class="text-sm text-slate-500 mt-1">For order updates</p>
            </div>

            <!-- Full name -->
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Full name</label>
                <input type="text" id="name"
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
            </div>

            <!-- Street address -->
            <div>
                <label for="address" class="block text-sm font-medium text-slate-700 mb-1">Street address</label>
                <input type="text" id="address"
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
            </div>

            <!-- Apt/Suite -->
            <div>
                <label for="apt" class="block text-sm font-medium text-slate-700 mb-1">Apt/Suite (optional)</label>
                <input type="text" id="apt"
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
            </div>

            <!-- City -->
            <div>
                <label for="city" class="block text-sm font-medium text-slate-700 mb-1">City</label>
                <input type="text" id="city"
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
            </div>

            <!-- State and ZIP -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="state" class="block text-sm font-medium text-slate-700 mb-1">State</label>
                    <input type="text" id="state"
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                </div>
                <div>
                    <label for="zip" class="block text-sm font-medium text-slate-700 mb-1">ZIP</label>
                    <input type="text" id="zip"
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                </div>
            </div>

            <!-- Delivery speed -->
            <div>
                <label for="delivery" class="block text-sm font-medium text-slate-700 mb-1">Delivery speed</label>
                <select id="delivery"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent">
                    <option value="20">Overnight - $20</option>
                    <option value="15">2-3 days - $15</option>
                    <option value="8">5 days - $8</option>
                </select>
            </div>

            <!-- Continue button -->
            <a href="path-1-step-3-payment.html"
               class="block w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-md transition-colors text-center">
                Continue to payment
            </a>

            <!-- Cancel -->
            <a href="path-1-step-2.html"
               class="block w-full text-slate-600 hover:text-slate-900 font-medium py-3 px-4 transition-colors text-center">
                Back
            </a>
        </form>
    </div>

        <!-- Back to scenarios link -->
        <a href="../index.html" class="inline-flex items-center text-sm text-slate-600 hover:text-slate-900 mt-6">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back to all scenarios
        </a>
    </div>
</body>
</html>
