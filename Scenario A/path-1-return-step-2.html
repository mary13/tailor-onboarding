<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Fabric</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-2xl font-semibold text-slate-900 mb-6">
                Which fabric would you like for your dress?
            </h1>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Dress preview -->
                <div>
                    <div class="bg-slate-200 rounded-md h-96 sticky top-8 flex items-center justify-center">
                        <div class="text-center">
                            <span class="text-slate-400 text-sm block mb-2">Dress image</span>
                            <span class="text-slate-400 text-sm">(updates as you choose)</span>
                        </div>
                    </div>
                </div>

                <!-- Fabric selection -->
                <div class="space-y-6">
                    <p class="text-sm font-medium text-slate-600 mb-4">Your swatches:</p>

                    <div class="space-y-3">
                        <label class="flex items-center p-4 border-2 border-slate-200 rounded-md cursor-pointer hover:border-slate-300 transition-colors">
                            <input type="radio" name="fabric" value="silk-charmeuse-navy"
                                   class="w-4 h-4 text-slate-900 focus:ring-slate-900">
                            <span class="ml-3 text-slate-900">Silk charmeuse, navy</span>
                        </label>

                        <label class="flex items-center p-4 border-2 border-slate-200 rounded-md cursor-pointer hover:border-slate-300 transition-colors">
                            <input type="radio" name="fabric" value="silk-crepe-burgundy"
                                   class="w-4 h-4 text-slate-900 focus:ring-slate-900">
                            <span class="ml-3 text-slate-900">Silk crepe, burgundy</span>
                        </label>

                        <label class="flex items-center p-4 border-2 border-slate-200 rounded-md cursor-pointer hover:border-slate-300 transition-colors">
                            <input type="radio" name="fabric" value="cotton-sateen-white"
                                   class="w-4 h-4 text-slate-900 focus:ring-slate-900">
                            <span class="ml-3 text-slate-900">Cotton sateen, white</span>
                        </label>

                        <label class="flex items-center p-4 border-2 border-slate-200 rounded-md cursor-pointer hover:border-slate-300 transition-colors">
                            <input type="radio" name="fabric" value="linen-blend-natural"
                                   class="w-4 h-4 text-slate-900 focus:ring-slate-900">
                            <span class="ml-3 text-slate-900">Linen blend, natural</span>
                        </label>

                        <label class="flex items-center p-4 border-2 border-slate-200 rounded-md cursor-pointer hover:border-slate-300 transition-colors">
                            <input type="radio" name="fabric" value="wool-crepe-camel"
                                   class="w-4 h-4 text-slate-900 focus:ring-slate-900">
                            <span class="ml-3 text-slate-900">Wool crepe, camel</span>
                        </label>
                    </div>

                    <!-- Actions -->
                    <div class="pt-6 border-t border-slate-200 space-y-3">
                        <a href="path-1-return-step-3.html"
                           class="block w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-md transition-colors text-center">
                            Continue
                        </a>
                        <a href="path-1-return-step-1.html"
                           class="block w-full text-slate-600 hover:text-slate-900 font-medium py-3 px-4 transition-colors text-center">
                            Back
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
