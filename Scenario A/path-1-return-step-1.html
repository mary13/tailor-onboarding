<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-semibold text-slate-900 mb-2">
            Welcome back, Sarah
        </h1>
        <p class="text-lg text-slate-600 mb-8">
            Ready to complete your dress order?
        </p>

        <!-- What we have -->
        <div class="mb-6">
            <h2 class="text-sm font-medium text-slate-900 mb-3">We have on file:</h2>
            <ul class="space-y-2 text-sm text-slate-600">
                <li class="flex items-start">
                    <svg class="w-5 h-5 text-emerald-600 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span>Your shipping address</span>
                </li>
                <li class="flex items-start">
                    <svg class="w-5 h-5 text-emerald-600 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span>5 fabric swatches you requested</span>
                </li>
            </ul>
        </div>

        <!-- What's needed -->
        <div class="mb-6">
            <h2 class="text-sm font-medium text-slate-900 mb-3">You'll need to:</h2>
            <ul class="space-y-2 text-sm text-slate-600">
                <li class="flex items-start">
                    <svg class="w-5 h-5 text-slate-400 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <span>Choose your fabric</span>
                </li>
                <li class="flex items-start">
                    <svg class="w-5 h-5 text-slate-400 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <span>Provide measurements</span>
                </li>
                <li class="flex items-start">
                    <svg class="w-5 h-5 text-slate-400 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <span>Complete payment</span>
                </li>
            </ul>
        </div>

        <!-- Time estimate -->
        <div class="bg-slate-50 border border-slate-200 rounded-md p-3 mb-6">
            <p class="text-sm text-slate-600">
                <svg class="w-4 h-4 inline mr-1 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                This will take about 5 minutes.
            </p>
        </div>

        <!-- Actions -->
        <div class="space-y-3">
            <a href="path-1-return-step-2.html"
               class="block w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-md transition-colors text-center">
                Let's go
            </a>

            <a href="index.html"
               class="block w-full text-slate-600 hover:text-slate-900 font-medium py-3 px-4 transition-colors text-center">
                Not ready yet
            </a>
        </div>
    </div>
</body>
</html>
