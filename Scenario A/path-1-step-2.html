<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Swatches</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <div class="mb-6">
                <h1 class="text-2xl font-semibold text-slate-900 mb-2">Select up to 5 swatches</h1>
                <p class="text-slate-600">We'll send them overnight</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Dress preview -->
                <div>
                    <div class="bg-slate-200 rounded-md h-96 sticky top-8 flex items-center justify-center">
                        <div class="text-center">
                            <span class="text-slate-400 text-sm block mb-2">Dress image</span>
                            <span class="text-slate-400 text-sm">(updates as you hover/click)</span>
                        </div>
                    </div>
                </div>

                <!-- Fabric selection -->
                <div class="space-y-6">
                    <!-- Silk charmeuse -->
                    <div>
                        <h3 class="font-medium text-slate-900 mb-3">Silk charmeuse</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Navy solid</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Blush solid</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Emerald</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Black</span>
                            </label>
                        </div>
                    </div>

                    <!-- Silk crepe -->
                    <div>
                        <h3 class="font-medium text-slate-900 mb-3">Silk crepe</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Ivory</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Burgundy</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Slate</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Champagne</span>
                            </label>
                        </div>
                    </div>

                    <!-- Cotton sateen -->
                    <div>
                        <h3 class="font-medium text-slate-900 mb-3">Cotton sateen</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">White</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Coral</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Sage</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Navy stripe</span>
                            </label>
                        </div>
                    </div>

                    <!-- Linen blend -->
                    <div>
                        <h3 class="font-medium text-slate-900 mb-3">Linen blend</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Natural</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Terracotta</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Denim</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Charcoal</span>
                            </label>
                        </div>
                    </div>

                    <!-- Wool crepe -->
                    <div>
                        <h3 class="font-medium text-slate-900 mb-3">Wool crepe</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Camel</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Forest</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Plum</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                                <span class="text-sm text-slate-700">Gray</span>
                            </label>
                        </div>
                    </div>

                    <!-- Counter and continue -->
                    <div class="pt-6 border-t border-slate-200">
                        <p class="text-sm text-slate-600 mb-4" id="counter">0/5 selected</p>
                        <a href="path-1-step-3.html"
                           class="block w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-md transition-colors text-center">
                            Continue
                        </a>
                        <a href="index.html"
                           class="block w-full text-slate-600 hover:text-slate-900 font-medium py-3 px-4 transition-colors text-center">
                            Cancel
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple counter for selected checkboxes
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const counter = document.getElementById('counter');

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
                counter.textContent = `${checked}/5 selected`;

                // Disable unchecked boxes if 5 are selected
                if (checked >= 5) {
                    checkboxes.forEach(cb => {
                        if (!cb.checked) cb.disabled = true;
                    });
                } else {
                    checkboxes.forEach(cb => cb.disabled = false);
                }
            });
        });
    </script>
</body>
</html>
